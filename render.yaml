    plan: free
    # Will proxy /api/* requests internally to the gateway service

# Managed PostgreSQL Database
databases:
  - name: aicte-postgres
    databaseName: aicte_db
    user: aicte_user
    plan: free

# Managed Redis Cache
redis:
  - name: aicte-redis
    plan: free
    ipAllowList: [] # Access restricted to Render private network
