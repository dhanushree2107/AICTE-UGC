      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://aicte-registry-service:8761/eureka/
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: DB_HOST
        fromDatabase:
          name: aicte-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: aicte-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: aicte-postgres
          property: database
      - key: SPRING_DATASOURCE_USERNAME
