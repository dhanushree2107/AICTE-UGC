apiVersion: v1
kind: Namespace
metadata:
  name: aicte-ug

---
# 1. PostgreSQL Database Config & Deployment
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: aicte-ug
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicte-postgres
  namespace: aicte-ug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: aicte_db
            - name: POSTGRES_USER
              value: aicte_user
            - name: POSTGRES_PASSWORD
              value: aicte_password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aicte-ug
spec:
  ports:
    - port: 5432
  selector:
    app: postgres

---
# 2. Redis Cache Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicte-redis
  namespace: aicte-ug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aicte-ug
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---
# 3. Keycloak Authentication Server
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicte-keycloak
  namespace: aicte-ug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: aicte-ug
spec:
  ports:
    - port: 8080
  selector:
    app: keycloak

---
# 4. API Gateway Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: aicte-ug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: aicte/gateway-service:latest
          ports:
            - containerPort: 8060
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://registry-service:8761/eureka/

---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: aicte-ug
spec:
  type: LoadBalancer
  ports:
    - port: 8060
      targetPort: 8060
  selector:
    app: gateway-service

---
# 5. FastAPI AI Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: aicte-ug
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: aicte/ai-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: aicte-ug
spec:
  ports:
    - port: 8000
  selector:
    app: ai-service
