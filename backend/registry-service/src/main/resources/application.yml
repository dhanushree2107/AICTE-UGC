server:
  port: 8761

spring:
  application:
    name: registry-service

eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

---
spring:
  config:
    activate:
      on-profile: docker

eureka:
  instance:
    hostname: registry-service
  client:
    serviceUrl:
      defaultZone: http://registry-service:8761/eureka/
