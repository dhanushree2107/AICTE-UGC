server:
  port: 8088

spring:
  application:
    name: ai-integration-service
  datasource:
    url: jdbc:postgresql://localhost:5432/aicte_db
    username: aicte_user
    password: aicte_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/aicte-realm

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

ai:
  service:
    url: http://localhost:8000

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/aicte_db
  data:
    redis:
      host: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/aicte-realm

eureka:
  client:
    serviceUrl:
      defaultZone: http://registry-service:8761/eureka/

ai:
  service:
    url: http://ai-service:8000
